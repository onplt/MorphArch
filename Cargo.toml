[package]
name = "morpharch"
version = "0.3.0"
edition = "2024"
authors = ["Onur <onur@morpharch.dev>"]
description = "Monorepo architecture drift visualizer with animated TUI"
license = "MIT OR Apache-2.0"

[dependencies]
# CLI framework — derive macro ile ergonomik subcommand tanımı
clap = { version = "4.5", features = ["derive"] }

# Git işlemleri — gitoxide projesinin kütüphane crate'i
gix = "0.70"

# SQLite — bundled özelliği ile sistem SQLite'a bağımlılık yok
rusqlite = { version = "0.32", features = ["bundled"] }

# Structured logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Hata yönetimi — context chain ile zengin hata mesajları
anyhow = "1.0"

# Serileştirme
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Tarih/saat işlemleri
chrono = { version = "0.4", features = ["serde"] }

# Platform-bağımsız dizin yolları (home dir, config dir vb.)
dirs = "5.0"

# ── Sprint 2: Dependency Graph ──────────────────────────────────────────────

# Directed graph veri yapısı — bağımlılık grafi modelleme
petgraph = { version = "0.6", features = ["serde-1", "graphmap", "stable_graph"] }

# Tree-sitter — incremental parsing framework (C tabanlı, hızlı)
tree-sitter = "0.22"

# Dil gramerleri — her biri C grammar'ını derler
tree-sitter-rust = "0.21"
tree-sitter-typescript = "0.21"
tree-sitter-python = "0.21"
tree-sitter-go = "0.21"

# Dosya sistemi yürüyüşü
walkdir = "2.5"
