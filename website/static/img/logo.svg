<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7" />
      <stop offset="100%" stop-color="#bb9af7" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9ece6a" />
      <stop offset="100%" stop-color="#7dcfff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background (Optional: can be made transparent, but kept for dark theme consistency) -->
  <rect width="512" height="512" rx="100" fill="#1a1b26" />

  <!-- Core Graph Structure -->
  <g transform="translate(256, 256)">
    <!-- Edges -->
    <path d="M 0 -120 L -100 60 L 100 60 Z" fill="none" stroke="url(#secondaryGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
    <path d="M 0 0 L 0 -120 M 0 0 L -100 60 M 0 0 L 100 60" fill="none" stroke="url(#primaryGrad)" stroke-width="16" stroke-linecap="round" />

    <!-- Nodes with Glow -->
    <circle cx="0" cy="-120" r="32" fill="url(#primaryGrad)" filter="url(#glow)" />
    <circle cx="-100" cy="60" r="24" fill="#bb9af7" />
    <circle cx="100" cy="60" r="24" fill="#7aa2f7" />
    
    <!-- Central Hub -->
    <circle cx="0" cy="0" r="40" fill="#1a1b26" stroke="url(#primaryGrad)" stroke-width="12" />
    <circle cx="0" cy="0" r="16" fill="#9ece6a" filter="url(#glow)" />
  </g>
</svg>
