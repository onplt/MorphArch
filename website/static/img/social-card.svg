<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16161e" />
      <stop offset="100%" stop-color="#1a1b26" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7" />
      <stop offset="100%" stop-color="#bb9af7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />
  
  <!-- Abstract Grid Pattern -->
  <g opacity="0.1" stroke="#7aa2f7" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100" />
    <line x1="0" y1="200" x2="1200" y2="200" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="400" x2="1200" y2="400" />
    <line x1="0" y1="500" x2="1200" y2="500" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Logo Icon -->
  <g transform="translate(150, 315) scale(0.8)">
    <g transform="translate(-256, -256)">
      <path d="M 256 136 L 156 316 L 356 316 Z" fill="none" stroke="#9ece6a" stroke-width="12" opacity="0.4" />
      <path d="M 256 256 L 256 136 M 256 256 L 156 316 M 256 256 L 356 316" fill="none" stroke="url(#logoGrad)" stroke-width="16" stroke-linecap="round" />
      <circle cx="256" cy="136" r="32" fill="url(#logoGrad)" filter="url(#glow)" />
      <circle cx="156" cy="316" r="24" fill="#bb9af7" />
      <circle cx="356" cy="316" r="24" fill="#7aa2f7" />
      <circle cx="256" cy="256" r="40" fill="#1a1b26" stroke="url(#logoGrad)" stroke-width="12" />
      <circle cx="256" cy="256" r="16" fill="#9ece6a" filter="url(#glow)" />
    </g>
  </g>

  <!-- Text Content -->
  <g transform="translate(450, 315)">
    <text font-family="Arial, sans-serif" font-weight="800" font-size="100" fill="url(#logoGrad)" y="-20">MorphArch</text>
    <text font-family="Arial, sans-serif" font-weight="400" font-size="36" fill="#a9b1d6" y="60">Visualizing Software Architecture Evolution</text>
    
    <!-- Badges in Preview -->
    <g transform="translate(0, 130)">
      <rect width="180" height="40" rx="8" fill="#7aa2f7" opacity="0.2" />
      <text font-family="monospace" font-size="18" fill="#7aa2f7" x="20" y="26">cargo install morpharch</text>
    </g>
  </g>

  <!-- Footer Info -->
  <text x="1150" y="580" text-anchor="end" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#565f89">morpharch.dev</text>
</svg>
